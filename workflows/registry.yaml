# registry.yaml
# =============================================================================
# Command Registry — Maps high-level SDD commands to their workflow definitions
# and the rules that apply during each phase.
#
# The agent reads this file to determine which workflow to execute and which
# rules to enforce when a command is invoked.
# =============================================================================

commands:
  specify:
    description: "Phase 1: Discovery and Specification"
    workflow: "workflows/commands/specify.md"
    rules_enforced:
      - "rules/coding-standards.md"    # For naming conventions in the spec
    templates_used:
      - "templates/spec-template.md"
    outputs:
      - "specs/{SPEC-ID}-{name}.md"
    requires_approval: true
    next_command: "plan"

  plan:
    description: "Phase 2: Design and Planning"
    workflow: "workflows/commands/plan.md"
    rules_enforced:
      - "rules/coding-standards.md"
      - "rules/security-rules.md"
    templates_used:
      - "templates/plan-template.md"
      - "templates/tasks-template.md"
      - "templates/data-model-template.md"
    outputs:
      - "plans/{PLAN-ID}-{name}.md"
      - "tasks/{PLAN-ID}-tasks.md"
    requires_approval: true
    next_command: "implement"

  implement:
    description: "Phase 3: Implementation with TDD"
    workflow: "workflows/commands/implement.md"
    rules_enforced:
      - "rules/coding-standards.md"
      - "rules/security-rules.md"
      - "rules/quality-gates.json"
    templates_used: []
    outputs:
      - "Source code files (per task boundary)"
      - "Test files"
    requires_approval: false
    triggers_review: true

  review:
    description: "Quality Gates and Code Review"
    workflow: "workflows/commands/review.md"
    rules_enforced:
      - "rules/coding-standards.md"
      - "rules/security-rules.md"
      - "rules/quality-gates.json"
    templates_used: []
    outputs:
      - "Review report"
      - "memory/decision-log.md (updated)"
    requires_approval: false
    max_retries: 2

  exposition:
    description: "Generate academic presentation (summary, LaTeX slides, script)"
    workflow: "workflows/commands/exposition.md"
    rules_enforced:
      - "rules/coding-standards.md"
      - "rules/diagram-standards.md"
    templates_used:
      - "command_assets/exposition/spec_template.md"
      - "command_assets/exposition/plan_template.md"
      - "command_assets/exposition/tasks_template.md"
    additional_assets:
      - source: "command_assets/exposition/templates/"
        destination: "presentacion/"
        copy_condition: "Copiar SOLO al ejecutar TASK-04 en el comando /exposition"
    outputs:
      - "specs/SPEC-XX-exposicion.md"
      - "plans/PLAN-XX-exposicion.md"
      - "tasks/TASKS-XX-exposicion.md"
      - "resumen_{fuente}.md"
      - "presentacion/presentacion.tex"
      - "presentacion/presentacion.pdf  (si compilador disponible)"
      - "guion_exposicion.md"
      - "presentacion/diagramas/*.mmd + *.svg  (si se requieren diagramas)"
    requires_approval: true

  report:
    description: "Generate academic/technical report in LaTeX (IEEE/CIEP) with Mermaid diagrams"
    workflow: "workflows/commands/report.md"
    rules_enforced:
      - "rules/coding-standards.md"
      - "rules/diagram-standards.md"
    templates_used:
      - "command_assets/reporte/spec_template.md"
      - "command_assets/reporte/plan_template.md"
      - "command_assets/reporte/tasks_template.md"
    outputs:
      - "specs/SPEC-XX-reporte.md"
      - "plans/PLAN-XX-reporte.md"
      - "tasks/TASKS-XX-reporte.md"
      - "reporte/reporte.tex"
      - "reporte/reporte.pdf  (si compilador disponible)"
      - "reporte/diagramas/*.mmd + *.svg  (si se requieren diagramas)"
    requires_approval: true

# ---------------------------------------------------------------------------
# Lifecycle Flow
# ---------------------------------------------------------------------------
lifecycle:
  master_workflow: "workflows/sdd-lifecycle.md"
  phase_order:
    - "specify"
    - "plan"
    - "implement"
  phase_skip_allowed: false
  human_approval_required_between_phases: true

# ---------------------------------------------------------------------------
# Memory Files
# ---------------------------------------------------------------------------
memory:
  context: "memory/project-context.md"
  decisions: "memory/decision-log.md"
  decisions_append_only: true

