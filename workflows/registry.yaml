# registry.yaml
# =============================================================================
# Command Registry — Maps high-level SDD commands to their workflow definitions
# and the rules that apply during each phase.
#
# The agent reads this file to determine which workflow to execute and which
# rules to enforce when a command is invoked.
# =============================================================================

commands:
  specify:
    description: "Phase 1: Discovery and Specification"
    workflow: "workflows/commands/specify.md"
    rules_enforced:
      - "rules/coding-standards.md"    # For naming conventions in the spec
    templates_used:
      - "templates/spec-template.md"
    outputs:
      - "specs/{SPEC-ID}-{name}.md"
    requires_approval: true
    next_command: "plan"

  plan:
    description: "Phase 2: Design and Planning"
    workflow: "workflows/commands/plan.md"
    rules_enforced:
      - "rules/coding-standards.md"
      - "rules/security-rules.md"
    templates_used:
      - "templates/plan-template.md"
      - "templates/tasks-template.md"
      - "templates/data-model-template.md"
    outputs:
      - "plans/{PLAN-ID}-{name}.md"
      - "tasks/{PLAN-ID}-tasks.md"
    requires_approval: true
    next_command: "implement"

  implement:
    description: "Phase 3: Implementation with TDD"
    workflow: "workflows/commands/implement.md"
    rules_enforced:
      - "rules/coding-standards.md"
      - "rules/security-rules.md"
      - "rules/quality-gates.json"
    templates_used: []
    outputs:
      - "Source code files (per task boundary)"
      - "Test files"
    requires_approval: false
    triggers_review: true

  review:
    description: "Quality Gates and Code Review"
    workflow: "workflows/commands/review.md"
    rules_enforced:
      - "rules/coding-standards.md"
      - "rules/security-rules.md"
      - "rules/quality-gates.json"
    templates_used: []
    outputs:
      - "Review report"
      - "memory/decision-log.md (updated)"
    requires_approval: false
    max_retries: 2

# ---------------------------------------------------------------------------
# Lifecycle Flow
# ---------------------------------------------------------------------------
lifecycle:
  master_workflow: "workflows/sdd-lifecycle.md"
  phase_order:
    - "specify"
    - "plan"
    - "implement"
  phase_skip_allowed: false
  human_approval_required_between_phases: true

# ---------------------------------------------------------------------------
# Memory Files
# ---------------------------------------------------------------------------
memory:
  context: "memory/project-context.md"
  decisions: "memory/decision-log.md"
  decisions_append_only: true
